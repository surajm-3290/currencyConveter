<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="/calculatorRoot/style.css">
    <link rel="icon" href="/Assets/icon-img.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <nav>
            <h3><i class="fa-solid fa-calculator fa-xl" style="color: rgb(247, 247, 247);"></i> Currency Converter</h3>
            <div>
                <i class="fa-solid fa-circle-half-stroke fa-lg" id="theme" style="color: rgb(247, 247, 247);"></i>
                <p id="language"><i class="fa-solid fa-language fa-lg" style="color: rgb(247, 247, 247);"></i> Eng</p>
            </div>
        </nav>
    </header>
    <main>
        <h1>
            Currency Converter
        </h1>
        <p id="disciption">Convert Currencies in real time with the latest exchange rates</p>
        <div id="OuterFormContainer">
            <form>
                <div class="fullcontainer">
                    <div class="fromToContainer">
                        <h3>From:</h3>
                        <div class="selectContainer">
                            <div class="FlagImg" id="FlagImgFrom"></div>
                            <select id="selectFrom" required>
                                <option value="select" disabled selected>Select Country</option>
                            </select>
                        </div>
                        <input type="number" class="inputstyle" id="fromInput" placeholder="Enter Amount" required>
                    </div>
                    
                    <hr>

                    <div class="fromToContainer">
                        <h3>To:</h3>
                        <div class="selectContainer">
                            <div class="FlagImg" id="FlagImgTO"></div>
                            <select  id="selectTo">
                                <option value="select" disabled selected>Select County</option>
                            </select>
                        </div>
                        <input type="number" class="inputstyle" id="toOutput" placeholder='Press "Convert" Button To Display Amount' readonly>
                    </div>
                </div>
                <div id="perrate">
                   
                </div>
                <div class="rates">
                    
                    <button id="convert">Convert</button>
                </div>
                
            </form>
        </div>
        <div class="belowElement">
            <div class="elementBox">
                <div class="elemnentImage">
                    <i class="fa-solid fa-arrow-trend-down fa-flip-vertical fa-2xl" style="color: #7C5CFF;"></i>
                </div>
                <div class="belowBlockDetails">
                    <h4>Exchange Rate</h4>
                    <p id="exRate"> 1 CC = xx CC</p>
                </div>
            </div>

            <div class="elementBox">
                <div class="elemnentImage">
                    <i class="fa-solid fa-alarm-clock fa-2xl" style="color: #10B981;"></i>
                </div>
                <div class="belowBlockDetails">
                    <h4>Last Updated</h4>
                    <p id="lastUpdated"></p>    
                </div>
            </div>
            <div class="elementBox">
                <div class="elemnentImage">
                    <i class="fa-solid fa-shield fa-2xl" style="color: #3B82F6;"></i>
                </div>
                <div class="belowBlockDetails">
                    <h4>Rate Source</h4>
                    <p id="updatedDate">Frankfurter API</p>    
                </div>
            </div>
            <div class="elementBox">
                <div class="elemnentImage">
                    <i class="fa-solid fa-alarm-clock fa-2xl" style="color: #fbbf24;"></i>
                </div>
                <div class="belowBlockDetails">
                    <h4>Update Interval</h4>
                    <p id="UpdateInterval">Exactly 24 hours</p>    
                </div>
            </div>
        </div>

    </main>
    <footer>&hearts; Made with HTML, CSS & JavaScript(using Fetch API).</footer>
    

    <script src="/calculatorRoot/codes.js"></script>
    <script  src="/calculatorRoot/app.js" ></script>
</body>
</html>
